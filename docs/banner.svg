      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="ecgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#ef4444" stop-opacity="0.80"/>
      <stop offset="45%"  stop-color="#f97316" stop-opacity="0.90"/>
      <stop offset="80%"  stop-color="#fb923c" stop-opacity="0.65"/>
